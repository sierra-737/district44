<div class="container py-5">
  <h2 class="mb-4">Your Cart</h2>

  <div class="row">
    
    <!-- CART ITEMS -->
    <div class="col-md-7">
      <ul id="cart-list" class="list-group mb-3"></ul>
    </div>

    <!-- SUMMARY + CHECKOUT -->
    <div class="col-md-5">
      <div class="card p-3 shadow-sm">
        <h5>Order Summary</h5>
        <hr>

        <p class="d-flex justify-content-between">
          <span>Total</span>
          <strong id="total">$0</strong>
        </p>

        <button class="btn btn-dark w-100 mb-3" data-bs-toggle="collapse" data-bs-target="#checkoutForm">
          Proceed to Checkout
        </button>

        <!-- CHECKOUT FORM -->
        <div class="collapse" id="checkoutForm">
          <form id="orderForm">
            <input type="text" class="form-control mb-2" placeholder="Full Name" required>
            <input type="email" class="form-control mb-2" placeholder="Email" required>
            <input type="text" class="form-control mb-2" placeholder="Address" required>

            <select class="form-control mb-3" required>
              <option value="">Payment Method</option>
              <option>Credit Card</option>
              <option>Bank Transfer</option>
              <option>Cash on Delivery</option>
            </select>

            <button type="submit" class="btn btn-success w-100">
              Place Order
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cart-list");
let total = 0;

function renderCart() {
  list.innerHTML = "";
  total = 0;

  cart.forEach((item, index) => {
    let li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between align-items-center";

    let name = document.createElement("span");
    name.textContent = item.name;

    let right = document.createElement("div");

    let price = document.createElement("span");
    price.textContent = "$" + item.price;
    price.className = "me-3";

    let removeBtn = document.createElement("button");
    removeBtn.textContent = "Remove";
    removeBtn.className = "btn btn-sm btn-outline-danger";

    removeBtn.onclick = () => {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    };

    right.appendChild(price);
    right.appendChild(removeBtn);

    li.appendChild(name);
    li.appendChild(right);

    list.appendChild(li);

    total += Number(item.price);
  });

  document.getElementById("total").textContent = "$" + total;
}

renderCart();


// ✅ HANDLE ORDER SUBMIT
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  alert("✅ Order placed successfully!");

  localStorage.removeItem("cart");
  cart = [];
  renderCart();
});

</script>
