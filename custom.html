    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" href="new-arrivals.html">New Arrivals</a>
        </li>

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            Collections
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="collections.html">All Collections</a></li>
          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="custom.html">Custom Design</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">About Us</a>
        </li>
      </ul>

       <div class="d-flex gap-3 align-items-center">
  <span>🔍</span>
  <span>👤</span>

  <a href="cart.html" class="position-relative text-decoration-none">
    🛒
    <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge bg-dark">
      0
    </span>

</div>

</nav>

<div class="container py-5">
  <div class="row">

    <!-- LEFT: PREVIEW -->
    <div class="col-md-6 text-center">
      <div class="polo-preview">
        <div id="polo" class="polo">
          <span id="polo-text">SPAIN</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: CONTROLS -->
    <div class="col-md-6">

      <h6>DESIGN TYPE</h6>
      <div class="mb-3">
        <button class="btn btn-dark btn-sm">City Name</button>
        <button class="btn btn-outline-secondary btn-sm">Country Name</button>
        <button class="btn btn-outline-secondary btn-sm">Custom Text</button>
      </div>

      <div id="customInputContainer" class="mb-3" style="display:none;">
  <input type="text" id="customTextInput" class="form-control" placeholder="Enter custom text">
</div>

      <h6>CHOOSE CITY NAME</h6>
      <div class="mb-3 d-flex flex-wrap gap-2">
        <button class="btn btn-outline-dark btn-sm city">MIAMI</button>
        <button class="btn btn-outline-dark btn-sm city">NEW YORK</button>
        <button class="btn btn-outline-dark btn-sm city">PARIS</button>
        <button class="btn btn-outline-dark btn-sm city">TOKYO</button>
      </div>

    <h6>BAND COLOR</h6>
  <div class="mb-3 d-flex gap-2">
  <div class="color-circle bg-black" data-color="black"></div>
  <div class="color-circle bg-danger" data-color="red"></div>
  <div class="color-circle bg-white border" data-color="white"></div>
  <div class="color-circle bg-success" data-color="green"></div>
  <div class="color-circle bg-primary" data-color="blue"></div>
  </div>

      <h6>TEXT COLOR</h6>
  <div class="mb-3 d-flex gap-2">
  <div class="text-color bg-black" data-color="black"></div>
  <div class="text-color bg-danger" data-color="red"></div>
  <div class="text-color bg-white border" data-color="white"></div>
  <div class="text-color bg-success" data-color="green"></div>
  <div class="text-color bg-primary" data-color="blue"></div>
  </div>

      <button type="button" class="btn btn-dark w-100 mt-3" id="submitDesign">
  Submit Design
</button>

    </div>
  </div>
</div>
<script src="js/script.js"></script>
</body>
</html>
